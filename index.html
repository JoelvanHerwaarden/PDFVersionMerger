<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobleo Infra | PDF Vergelijker</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            /* Default System Colors (Light) */
            --bg-color: #ffffff;
            --container-bg: #fbfbfd;
            --card-bg: #ffffff;
            --text-main: #004268;
            --text-muted: rgba(0, 66, 104, 0.7);
            --accent: #0077bc;
            --button-bg: #39d6b2;
            --button-text: #ffffff;
            --border-color: #d2d2d7;
            --logo-filter: none;
            --shadow: rgba(0, 66, 104, 0.08);
        }

        [data-theme="dark"] {
            --bg-color: #002b45;
            --container-bg: rgba(255, 255, 255, 0.05);
            --card-bg: #004268;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --accent: #39d6b2;
            --button-bg: #39d6b2;
            --button-text: #004268;
            --border-color: rgba(255, 255, 255, 0.1);
            --logo-filter: brightness(0) invert(1);
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Toggle Button Style */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 40px;
            filter: var(--logo-filter);
        }

        .container { 
            width: 100%;
            max-width: 650px; 
            text-align: center;
        }

        h2 { 
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent); 
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .description-box {
            text-align: left;
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .description-box h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .description-box p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0;
            color: var(--text-muted);
        }

        .form-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .form-group { 
            margin-bottom: 1.5rem; 
            text-align: left;
        }

        label { 
            display: block; 
            font-size: 0.8rem;
            font-weight: 700; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.03em;
        }

        input[type="file"] { 
            width: 100%; 
            padding: 12px;
            background: var(--container-bg);
            border-radius: 12px;
            border: 2px dashed var(--border-color);
            cursor: pointer;
            color: var(--text-main);
        }

        button.main-btn { 
            background: var(--button-bg); 
            color: var(--button-text); 
            border: none; 
            padding: 1.1rem 3rem; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 700;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button.main-btn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(57, 214, 178, 0.4);
        }

        #status { 
            margin-top: 1.5rem; 
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Switch Mode</button>

    <img src="https://www.nobleo-infra.nl/wp-content/uploads/2025/02/Nobleo_BI_Logo_RGB.png.webp" alt="Nobleo Infra Logo" class="logo">

    <div class="container">
        <h2>Document Vergelijker</h2>

        <div class="description-box">
            <h3>Wat doet deze tool?</h3>
            <p>
                Deze applicatie is ontworpen om twee PDF-rapporten samen te voegen tot één document. De pagina's worden zij-aan-zij in <strong>Landscape</strong> geplaatst voor directe visuele analyse van berekeningen of revisies.
            </p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label for="pdf1">Referentie Document (Links)</label>
                <input type="file" id="pdf1" accept="application/pdf">
            </div>

            <div class="form-group">
                <label for="pdf2">Wijziging / Variant (Rechts)</label>
                <input type="file" id="pdf2" accept="application/pdf">
            </div>

            <button class="main-btn" onclick="mergePDFs()">Genereer Vergelijking</button>
            <div id="status"></div>
        </div>
    </div>

    <footer>&copy; Nobleo Infra - Professional Engineering Solutions</footer>

    <script>
        // --- Theme Logic ---
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        }

        // Initialize based on system preference or saved preference
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme) {
            setTheme(savedTheme);
        } else {
            setTheme(systemDark ? 'dark' : 'light');
        }

        // --- PDF Logic ---
        async function mergePDFs() {
            const file1 = document.getElementById('pdf1').files[0];
            const file2 = document.getElementById('pdf2').files[0];
            const statusEl = document.getElementById('status');

            if (!file1 || !file2) {
                statusEl.innerText = "Selecteer twee PDF documenten.";
                statusEl.style.color = "#ff6b6b";
                return;
            }

            statusEl.innerText = "Bezig met genereren...";

            try {
                const arrayBuffer1 = await file1.arrayBuffer();
                const arrayBuffer2 = await file2.arrayBuffer();
                const { PDFDocument } = PDFLib;

                const pdfDoc1 = await PDFDocument.load(arrayBuffer1);
                const pdfDoc2 = await PDFDocument.load(arrayBuffer2);
                const mergedPdf = await PDFDocument.create();

                const maxPages = Math.max(pdfDoc1.getPageCount(), pdfDoc2.getPageCount());

                for (let i = 0; i < maxPages; i++) {
                    let width = 595.28;
                    let height = 841.89;
                    let page1 = null;

                    if (i < pdfDoc1.getPageCount()) {
                        page1 = pdfDoc1.getPage(i);
                        width = page1.getWidth();
                        height = page1.getHeight();
                    } else if (i < pdfDoc2.getPageCount()) {
                        let tempPage = pdfDoc2.getPage(i);
                        width = tempPage.getWidth();
                        height = tempPage.getHeight();
                    }

                    const newPage = mergedPdf.addPage([width * 2, height]);

                    if (page1) {
                        const embeddedPage1 = await mergedPdf.embedPage(page1);
                        newPage.drawPage(embeddedPage1, { x: 0, y: 0 });
                    }

                    if (i < pdfDoc2.getPageCount()) {
                        const page2 = pdfDoc2.getPage(i);
                        const embeddedPage2 = await mergedPdf.embedPage(page2);
                        newPage.drawPage(embeddedPage2, { x: width, y: 0 });
                    }
                }

                const pdfBytes = await mergedPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = 'Nobleo_Infra_Vergelijking.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusEl.innerText = "✅ Succesvol gedownload.";
            } catch (error) {
                console.error(error);
                statusEl.innerText = "Fout bij verwerken.";
            }
        }
    </script>
</body>
</html>
